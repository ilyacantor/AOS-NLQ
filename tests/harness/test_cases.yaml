# ── Group 4: SaaS Efficiency ─────────────────────────────────────────────────

- id: SAAS_001
  query: "What is our burn multiple?"
  persona: cfo
  # Model: burn_multiple = -(FCF) / net_new_ARR; company is FCF-positive so burn is negative
  # Range: -0.29 (Q1'24) to -1.93 (Q4'26); all quarters negative = cash-generative
  assertions:
    - {field: value, operator: in_range, expected: [-2.5, 0.5]}
    - {field: unit, operator: equals, expected: ratio}
    - {field: confidence, operator: greater_than, expected: 0.6}
  tags: [saas, cfo, point]

- id: SAAS_002
  query: "Show me LTV to CAC ratio"
  persona: cro
  # Model: LTV = ACV * (1/annual_churn) * gross_margin_pct/100
  # CAC = (sm_expense * 4) / (new_customers * 4)
  # Range: 8.5 (Q1'26) to 10.4 (Q1'24); high due to low CAC relative to LTV
  assertions:
    - {field: value, operator: in_range, expected: [7.0, 12.0]}
    - {field: unit, operator: equals, expected: ratio}
  tags: [saas, cro, point]

- id: SAAS_003
  query: "What is our rule of 40?"
  persona: cfo
  # Model: rule_of_40 = rev_growth_annualized + FCF_margin
  # Q1'24 = 8.0 (outlier, no prior quarter for growth calc); Q2'24-Q4'26 = 54-69
  # No period in query -> NLQ returns latest, which is 55-69 range
  assertions:
    - {field: value, operator: in_range, expected: [45.0, 75.0]}
    - {field: unit, operator: equals, expected: pct}
  tags: [saas, cfo, point]

- id: SAAS_004
  query: "What is NRR?"
  persona: cro
  assertions:
    - {field: value, operator: in_range, expected: [100.0, 130.0]}
    - {field: unit, operator: equals, expected: pct}
  tags: [saas, cro, point]


