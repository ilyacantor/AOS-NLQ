# ═══════════════════════════════════════════════════════════════════════════════
# NLQ Cheatproof Test Harness — Test Case Definitions
# ═══════════════════════════════════════════════════════════════════════════════
#
# 42 test cases across 10 coverage areas.
# All expected values derived from Farm financial_model.py Assumptions.
# NEVER from fact_base.json.
#
# Assertion operators:
#   equals, not_equals, greater_than, less_than, not_null, contains, in_range, in
#
# ═══════════════════════════════════════════════════════════════════════════════


# ── Group 1: P&L Coverage ────────────────────────────────────────────────────

- id: PL_001
  query: "What is our EBITDA for 2025?"
  persona: cfo
  # Model: 2025 annual EBITDA = 49.02M (sum of Q1:11.14 + Q2:11.85 + Q3:12.61 + Q4:13.42)
  # Derivation: revenue * (1 - cogs_pct - sm_pct - rd_pct - ga_pct) per quarter, summed
  assertions:
    - {field: value, operator: in_range, expected: [40.0, 60.0]}
    - {field: unit, operator: equals, expected: usd_millions}
    - {field: period, operator: contains, expected: "2025"}
    - {field: data_source, operator: not_equals, expected: demo}
    - {field: confidence, operator: greater_than, expected: 0.7}
  tags: [pnl, cfo, point]

- id: PL_002
  query: "Show me the 2025 P&L"
  persona: cfo
  assertions:
    - {field: revenue, operator: in_range, expected: [100.0, 160.0]}
    - {field: cogs, operator: not_null, expected: null}
    - {field: gross_profit, operator: not_null, expected: null}
    - {field: ebitda, operator: not_null, expected: null}
    - {field: net_income, operator: not_null, expected: null}
    - {field: data_source, operator: not_equals, expected: demo}
  tags: [pnl, cfo, breakdown]

- id: PL_003
  query: "What was gross margin in Q3 2025?"
  persona: cfo
  assertions:
    - {field: value, operator: in_range, expected: [60.0, 75.0]}
    - {field: unit, operator: equals, expected: pct}
    - {field: period, operator: equals, expected: "2025-Q3"}
  tags: [pnl, cfo, point]

- id: PL_004
  query: "What is our net income margin?"
  persona: cfo
  # Model: net_margin_pct ranges 26.2% (2024-Q1) to 27.7% (2026-Q4)
  # Derivation: net_income / revenue * 100; tax_rate=0.25, opex ~26.5% of rev
  # No period specified → NLQ returns latest quarter; range covers all possible quarters
  assertions:
    - {field: value, operator: in_range, expected: [24.0, 32.0]}
    - {field: unit, operator: equals, expected: pct}
    - {field: confidence, operator: greater_than, expected: 0.6}
  tags: [pnl, cfo, point]


