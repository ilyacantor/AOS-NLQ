      notes: "DORA metric — lead time in days, Q4 2025"

    - id: CTO_006
      question: "Show me incidents by service"
      expect_type: breakdown
      expected_value: null
      tolerance_pct: 0
      expected_unit: count
      notes: "Should show dimensional breakdown by service"

    - id: CTO_007
      question: "What is deployment success rate?"
      expect_type: point
      expected_value: 96.7
      tolerance_pct: 5
      expected_unit: pct
      notes: "Q4 2025 — 96.7% deployment success"

    - id: CTO_008
      question: "What is our tech debt?"
      expect_type: point
      expected_value: 0.133
      tolerance_pct: 25
      expected_unit: pct
      notes: "Q4 2025 — Farm stores as decimal 0.133 (= 13.3%). DCL passes through as-is."

  chro:
    - id: CHRO_001
      question: "What is our attrition rate?"
      expect_type: point
      expected_value: 11.5
      tolerance_pct: 15
      expected_unit: pct
      notes: "Q4 2025 — 11.5% attrition"

    - id: CHRO_002
      question: "Show me attrition by department"
      expect_type: breakdown
      expected_value: null
      tolerance_pct: 15
      expected_unit: pct
      notes: "Should show attrition rate per department"
      check_dimensions: ["Engineering", "Sales"]

    - id: CHRO_003
      question: "What is employee engagement?"
      expect_type: point
      expected_value: 4.25
      tolerance_pct: 10
