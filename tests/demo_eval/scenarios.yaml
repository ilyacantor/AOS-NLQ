      notes: "Engagement score — 1-5 scale"

    - id: CHRO_004
      question: "How many open roles do we have?"
      expect_type: point
      expected_value: 51
      tolerance_pct: 20
      expected_unit: count
      notes: "Q4 2025 open roles"

    - id: CHRO_005
      question: "What is our offer acceptance rate?"
      expect_type: point
      expected_value: 84.5
      tolerance_pct: 10
      expected_unit: pct
      notes: "Q4 2025 — ~84-85% offer acceptance"

    - id: CHRO_006
      question: "Show me headcount growth 2024 vs 2025"
      expect_type: comparison
      expected_value: null
      tolerance_pct: 15
      expected_unit: count
      notes: "Should show ~235 (2024-Q1) vs ~321 (2025-Q4) or annual comparison"
      check_fields: ["value_2024", "value_2025"]

    - id: CHRO_007
      question: "time to fill"
      expect_type: point
      expected_value: 45
      tolerance_pct: 25
