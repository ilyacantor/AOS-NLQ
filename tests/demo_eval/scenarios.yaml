# Demo Eval Scenarios — Qualitative Scoring
# 5 personas x 8 queries = 40 scenarios
# Each scored on: Correct (1-3), Complete (1-3), Natural (1-3)
# Max per persona: 24. Passing bar: 18 (75%).
#
# Ground truth source: AOS-Farm fact_base.json v5.0
# 2025 annual values (sum of 4 quarters for flow metrics, Q4 for stock):
#   Revenue: 124.18M  EBITDA: 49.02M  Net Income: 33.51M
#   ARR (Q4): 139.04M  Cash (Q4): 135.74M  FCF: 44.83M
#   Pipeline (Q4): 121.61M  Headcount (Q4): 321  Bookings: 180.76M
#
# expected_value: ground truth value from Farm
# tolerance_pct: how far off the value can be and still score Correct=3
#   (2x tolerance = Correct=2, beyond = Correct=1)
# expect_type: what kind of response we expect
#   point — single value with unit
#   breakdown — dimensional data (value may be null, check dimensions)
#   comparison — two periods side by side
#   clarification — should ask for clarification
#   composite — multi-metric response (P&L, dashboard)
#   superlative — ranked result ("top rep", "highest region")

metadata:
  version: "1.0"
  description: "Structured agent demo eval — qualitative scoring"
  total_scenarios: 40
  passing_bar_per_persona: 18
  max_per_persona: 24

scenarios:
  cfo:
    - id: CFO_001
      question: "What is our revenue for 2025?"
      expect_type: point
      expected_value: 124.18
      tolerance_pct: 10
      expected_unit: usd_millions
      notes: "Annual flow metric — sum of 4 quarters (fact_base.json)"

    - id: CFO_002
      question: "Compare 2024 vs 2025 EBITDA"
      expect_type: comparison
      expected_value: null
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "Should show both years: ~35.9M (2024) vs ~49.0M (2025)"
      check_fields: ["value_2024", "value_2025"]

    - id: CFO_003
      question: "What is EBITDA margin?"
      expect_type: point
      expected_value: 39.0
      tolerance_pct: 10
      expected_unit: pct
      notes: "Non-additive — should average ~39.0% across 2025 quarters"

    - id: CFO_004
      question: "Show me revenue by region"
      expect_type: breakdown
      expected_value: null
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "AMER ~50%, EMEA ~30%, APAC ~20%. Check all 3 present."
      check_dimensions: ["AMER", "EMEA", "APAC"]

    - id: CFO_005
      question: "What is our cash position?"
      expect_type: point
      expected_value: 135.74
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "Balance sheet — Q4 2025 point-in-time value"

    - id: CFO_006
      question: "What is our burn multiple?"
      expect_type: point
      expected_value: -1.3
      tolerance_pct: 40
      expected_unit: ratio
      notes: "Negative = cash generative. Wide tolerance for computed metric."

    - id: CFO_007
      question: "How is profitability?"
      expect_type: composite
      expected_value: null
      tolerance_pct: 0
      expected_unit: null
      notes: "Vague — should either ask for clarification or show profitability dashboard"

    - id: CFO_008
      question: "What is free cash flow for 2025?"
      expect_type: point
      expected_value: 44.83
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "Annual flow metric — sum of Q1-Q4 2025 FCF"

  cro:
    - id: CRO_001
      question: "What is our pipeline?"
      expect_type: point
      expected_value: 121.61
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "Current quarter pipeline — Q4 2025 stock metric"

    - id: CRO_002
      question: "Show me pipeline by stage"
      expect_type: breakdown
      expected_value: null
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "Should show Lead, Qualified, Proposal, Negotiation, Closed-Won"
      check_dimensions: ["Lead", "Qualified", "Proposal"]

    - id: CRO_003
      question: "What is our win rate?"
      expect_type: point
      expected_value: 40.5
      tolerance_pct: 10
      expected_unit: pct
      notes: "Non-additive — average across 2025 quarters ~40-41%"

    - id: CRO_004
      question: "Who is our top performing sales rep?"
      expect_type: superlative
      expected_value: null
      tolerance_pct: 0
      expected_unit: null
      notes: "Should return a rep name with quota attainment value"
      check_fields: ["dimension_value"]

    - id: CRO_005
      question: "What is NRR?"
      expect_type: point
      expected_value: 103.5
      tolerance_pct: 10
      expected_unit: pct
      notes: "Non-additive — average across 2025 quarters ~103-104%"

    - id: CRO_006
      question: "How many new customers this quarter?"
      expect_type: point
      expected_value: 62
      tolerance_pct: 20
      expected_unit: count
      notes: "Q4 2025 value — 62 new customers"

    - id: CRO_007
      question: "Show me bookings for 2025"
      expect_type: point
      expected_value: 180.76
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "Annual flow metric — sum of 4 quarters"

    - id: CRO_008
      question: "What is quota attainment?"
      expect_type: point
      expected_value: 150
      tolerance_pct: 10
      expected_unit: pct
      notes: "Non-additive — should be ~150% (consistent across quarters)"

  coo:
    - id: COO_001
      question: "What is customer satisfaction?"
      expect_type: point
      expected_value: 4.22
      tolerance_pct: 10
      expected_unit: score
      notes: "CSAT score — Q4 2025 value or 2025 average"

    - id: COO_002
      question: "Show me CSAT by segment"
      expect_type: breakdown
      expected_value: null
      tolerance_pct: 15
      expected_unit: score
      notes: "Should show Enterprise, Mid-Market, SMB segments"
      check_dimensions: ["Enterprise", "Mid-Market", "SMB"]

    - id: COO_003
      question: "What is our NPS?"
      expect_type: point
      expected_value: 47
      tolerance_pct: 15
      expected_unit: score
      notes: "NPS score — Q4 2025 value ~47"

    - id: COO_004
      question: "How many support tickets this quarter?"
      expect_type: point
      expected_value: 4121
      tolerance_pct: 15
      expected_unit: count
      notes: "Q4 2025 support ticket count"

    - id: COO_005
      question: "What is our headcount?"
      expect_type: point
      expected_value: 321
      tolerance_pct: 10
      expected_unit: count
      notes: "Q4 2025 headcount — stock metric"

    - id: COO_006
      question: "Show me headcount by department"
      expect_type: breakdown
      expected_value: null
      tolerance_pct: 15
      expected_unit: count
      notes: "Engineering, Sales, Customer Success, Marketing, Product, G&A"
      check_dimensions: ["Engineering", "Sales", "G&A"]

    - id: COO_007
      question: "What is revenue per employee?"
      expect_type: point
      expected_value: 0.105
      tolerance_pct: 25
      expected_unit: usd_millions
      notes: "Computed: Q4 2025 revenue / headcount. Wide tolerance."

    - id: COO_008
      question: "Which department has the highest attrition?"
      expect_type: superlative
      expected_value: null
      tolerance_pct: 0
      expected_unit: null
      notes: "Should return a department name with attrition rate"
      check_fields: ["dimension_value"]

  cto:
    - id: CTO_001
      question: "How many P1 incidents this quarter?"
      expect_type: point
      expected_value: 3
      tolerance_pct: 50
      expected_unit: count
      notes: "Q4 2025 — 3 P1 incidents. Wide tolerance for small numbers."

    - id: CTO_002
      question: "What is our uptime?"
      expect_type: point
      expected_value: 99.59
      tolerance_pct: 2
      expected_unit: pct
      notes: "Uptime — tight tolerance, should be ~99.5-99.7%"

    - id: CTO_003
      question: "Show me cloud spend by category"
      expect_type: breakdown
      expected_value: null
      tolerance_pct: 15
      expected_unit: usd_millions
      notes: "Should show resource type breakdown (compute, storage, etc.)"

    - id: CTO_004
      question: "What is sprint velocity?"
      expect_type: point
