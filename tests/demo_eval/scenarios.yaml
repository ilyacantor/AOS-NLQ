    - id: CHRO_008
      question: "Which department has the lowest engagement?"
      expect_type: superlative
      expected_value: null
      tolerance_pct: 0
      expected_unit: null
      notes: "Should return department name with engagement score"
      check_fields: ["dimension_value"]
