# ── P&L Shape ────────────────────────────────────────────────────────────────

- id: PI_014
  name: "Combining IS returns both entities"
  category: pnl_shape
  description: "DCL combining-is endpoint returns columns for both entities"
  method: GET
  service: dcl
  path: "/api/reports/combining-is"
  params:
    period: "2025-Q1"
  assertions:
    - field: _body
      operator: contains
      expected: "meridian"
    - field: _body
      operator: contains
      expected: "cascadia"

- id: PI_015
  name: "Meridian P&L has consultancy terms"
  category: pnl_shape
  description: "Meridian column contains consultancy-specific line items"
  method: GET
  service: dcl
  path: "/api/reports/combining-is"
  params:
    period: "2025-Q1"
  assertions:
    - field: _body
      operator: contains_any
      expected: ["Advisory", "Consultant", "Bench", "T&M", "consulting"]

- id: PI_016
  name: "Cascadia P&L has BPM terms"
  category: pnl_shape
  description: "Cascadia column contains BPM-specific line items"
  method: GET
  service: dcl
  path: "/api/reports/combining-is"
  params:
    period: "2025-Q1"
  assertions:
    - field: _body
      operator: contains_any
      expected: ["Offshore", "Nearshore", "Managed Services", "Per-FTE", "BPM"]


