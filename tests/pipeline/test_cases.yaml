# ── Not-fact_base Guard ──────────────────────────────────────────────────────

- id: PI_021
  name: "NLQ data_source is dcl for live queries"
  category: guard
  description: "Every NLQ live query must set data_source to 'dcl'. No None, no fact_base, no demo."
  method: POST
  service: nlq
  path: "/api/v1/query"
  body:
    question: "what is total revenue"
    data_mode: "live"
  assertions:
    - field: data_source
      operator: equals
      expected: "dcl"
    - field: value
      operator: not_null
