- id: PI_013
  name: "Reconcile Cascadia gross_profit"
  category: ground_truth
  description: "Farm ground truth gross_profit vs NLQ actual for Cascadia"
  reconciliation: true
  depends_on: PI_002B
  entity_id: "cascadia"
  metric: "gross_profit"
  period: "2025-Q1"
