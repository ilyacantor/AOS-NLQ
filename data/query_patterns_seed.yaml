    - {nl: "Show me headcount by department", canonical_metric: headcount, period_type: current, dimension: department, tags: [people, dimensional]}
    - {nl: "How many new hires this quarter?", canonical_metric: new_hires, period_type: current, tags: [recruiting]}
    - {nl: "What is our internal mobility rate?", canonical_metric: internal_mobility_rate_pct, period_type: current, tags: [people, development]}
