    - {nl: "What is SLO attainment?", canonical_metric: slo_attainment_pct, period_type: current, tags: [reliability, slo]}
    - {nl: "Show me SLO attainment by service", canonical_metric: slo_attainment_pct, period_type: current, dimension: service, tags: [reliability, dimensional]}
    - {nl: "What is our engineering headcount?", canonical_metric: engineering_headcount, period_type: current, tags: [people, engineering]}
    - {nl: "Show me headcount by team", canonical_metric: engineering_headcount, period_type: current, dimension: team, tags: [people, dimensional]}
    - {nl: "What is our bug escape rate?", canonical_metric: bug_escape_rate, period_type: current, tags: [engineering, quality]}
    - {nl: "Which service has the most incidents?", canonical_metric: p1_incidents, period_type: current, dimension: service, tags: [incidents, superlative]}
    - {nl: "What is downtime this quarter?", canonical_metric: downtime_hours, period_type: current, tags: [reliability]}
    - {nl: "What is engineering utilization?", canonical_metric: engineering_utilization, period_type: current, tags: [engineering, efficiency]}
    - {nl: "Show me deploy frequency by service", canonical_metric: deploy_frequency, period_type: current, dimension: service, tags: [engineering, dora, dimensional]}

