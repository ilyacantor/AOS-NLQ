# ─── Efficiency / SaaS ────────────────────────────────────────────

burn_multiple:
  type: derived
  unit: "ratio"
  formula: "cash_flow.net_burn / revenue.recurring"
  components:
    - concept: "cash_flow.net_burn"
      property: "amount"
    - concept: "revenue.recurring"
      property: "amount"

revenue_per_employee:
  type: derived
  unit: "usd"
  formula: "revenue.total / workforce.headcount.total"
  components:
    - concept: "revenue.total"
      property: "amount"
    - concept: "workforce.headcount.total"
      property: "count"

magic_number:
  type: derived
  unit: "ratio"
  formula: "(revenue.total[t] - revenue.total[t-1]) * 4 / opex.sales_marketing[t-1]"
  components:
    - concept: "revenue.total"
      property: "amount"
    - concept: "opex.sales_marketing"
      property: "amount"

ltv_cac:
  concept: "service.ltv_cac"
  property: "ratio"
  type: direct
  unit: "ratio"

cac_payback_months:
  concept: "service.cac_payback"
  property: "months"
  type: direct
  unit: "months"

