# NLQ metric name → DCL triple concept + property + computation
#
# Types:
#   direct  — single triple lookup by concept + property
#   derived — computed from multiple triples using formula
#
# Each NLQ metric name maps to exactly one resolution strategy.
# Missing metric = structured error from the v2 client, not silent fallback.

# ─── Revenue & Sales ───────────────────────────────────────────────

revenue:
  concept: "revenue.total"
  property: "amount"
  type: direct
  unit: "usd"
  aliases: ["total_revenue", "top_line"]

arr:
  concept: "revenue.recurring"
  property: "amount"
  type: direct
  unit: "usd"
  aliases: ["annual_recurring_revenue", "recurring_revenue"]

new_logo_revenue:
  concept: "revenue.new_logo"
  property: "amount"
  type: direct
  unit: "usd"

expansion_revenue:
  concept: "revenue.expansion"
  property: "amount"
  type: direct
  unit: "usd"

renewal_revenue:
  concept: "revenue.renewal"
  property: "amount"
  type: direct
  unit: "usd"

bookings:
  concept: "revenue.bookings"
  property: "amount"
  type: direct
  unit: "usd"

# ─── Cost & Profitability ─────────────────────────────────────────

cogs:
  concept: "cogs.total"
  property: "amount"
  type: direct
  unit: "usd"

gross_margin:
  type: derived
  unit: "usd"
  formula: "revenue.total - cogs.total"
  components:
    - concept: "revenue.total"
      property: "amount"
    - concept: "cogs.total"
      property: "amount"

gross_margin_pct:
  type: derived
  unit: "pct"
  formula: "(revenue.total - cogs.total) / revenue.total * 100"
  components:
    - concept: "revenue.total"
      property: "amount"
    - concept: "cogs.total"
      property: "amount"
  aliases: ["gross_margin_percent"]

ebitda:
  concept: "pnl.ebitda"
  property: "amount"
  type: direct
  unit: "usd"
  aliases: ["earnings_before_interest_taxes"]

operating_margin_pct:
  type: derived
  unit: "pct"
  formula: "pnl.ebitda / revenue.total * 100"
  components:
    - concept: "pnl.ebitda"
      property: "amount"
    - concept: "revenue.total"
      property: "amount"
  aliases: ["operating_margin", "ebitda_margin"]

net_income:
  concept: "pnl.net_income"
  property: "amount"
  type: direct
  unit: "usd"
  aliases: ["net_profit", "bottom_line"]

